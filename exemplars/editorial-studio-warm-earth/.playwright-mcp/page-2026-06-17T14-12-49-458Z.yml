          - paragraph [ref=e15]: A soil-architecture practice composing monumental brand work in clay-thick type, restraint, and one warm seam.
    - region "Manifesto" [ref=e16]:
      - generic [ref=e17]:
        - heading "Manifesto" [level=2] [ref=e18]
        - paragraph [ref=e19]: "Earth, well-rammed, outlasts the hand that rammed it. We do not decorate. We compact, pressing the brief downward through tonal strata until only the seam remains: a slow, warm vertical that carries every page that follows."
        - paragraph [ref=e20]: Every project here is the same wall, lit from a different hour. Material, type, seam. Nothing else.
    - region "A wall is a horizon, set on its edge." [ref=e21]:
      - img "A monumental sun-warmed rammed-earth wall, horizontal sediment strata catching low afternoon light." [ref=e22]
      - heading "A wall is a horizon, set on its edge." [level=2] [ref=e24]
    - region "Compaction sequence" [ref=e25]:
      - generic [ref=e26]:
        - article [ref=e27]:
          - heading "Soil is read, not chosen." [level=3] [ref=e28]
          - paragraph [ref=e29]: "A site is a sentence already written. The studio's first move is to listen for its grain: sand, silt, clay, the ratio of each weighed in the palm before any drawing is made."
        - article [ref=e30]:
          - heading "Formwork holds the argument." [level=3] [ref=e31]
          - paragraph [ref=e32]: "We design the mould as carefully as the wall. Tolerances are kept monumental: a single seam, set true, that the eye reads as composure rather than detail."
        - article [ref=e33]:
          - heading "The wall composes itself." [level=3] [ref=e34]
          - paragraph [ref=e35]: Once tamped, earth resolves. The bicolor mosaic of moisture and mineral compresses into a single warm monolith, and the seam, the mark of our hand, quiets into the surface.
